apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
spec:
  replicas: 1 #FIXME: replica 수 조정
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      initContainers:
      - name: alembic-migrate
        image: 837126493345.dkr.ecr.ap-northeast-2.amazonaws.com/goormthon-3/backend:build-23
        command:
        - sh
        - -c
        - |
          echo "MySQL 준비 대기 중..."
          until mysqladmin ping -h mysql-service -u root -ppassword --silent; do
            echo "MySQL 아직 준비 안됨, 3초 후 재시도..."
            sleep 3
          done
          echo "MySQL 준비 완료. Alembic 마이그레이션 시작..."
          alembic upgrade head
          echo "마이그레이션 완료."
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tamnamarket-secret
              key: DATABASE_URL
      containers:
      - name: backend
        image: 837126493345.dkr.ecr.ap-northeast-2.amazonaws.com/goormthon-3/backend:build-23
        ports:
        - containerPort: 8080

        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: tamnamarket-secret
              key: DATABASE_URL
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: tamnamarket-secret
              key: GEMINI_API_KEY
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: tamnamarket-secret
              key: OPENAI_API_KEY
        - name: CLOVA_INVOKE_URL
          valueFrom:
            secretKeyRef:
              name: tamnamarket-secret
              key: CLOVA_INVOKE_URL
        - name: CLOVA_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: tamnamarket-secret
              key: CLOVA_SECRET_KEY
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: config-volume
        configMap:
          name: backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-deployment
spec:
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
      - name: mysql
        image: mysql:8.0
        env:
        - name: MYSQL_ROOT_PASSWORD
          value: "password"
        - name: MYSQL_DATABASE
          value: "tamnamarket"
        ports:
        - containerPort: 3306
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
spec:
  selector:
    app: mysql
  ports:
  - port: 3306
    targetPort: 3306
