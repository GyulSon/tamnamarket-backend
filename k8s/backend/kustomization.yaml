apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: goormthon-3 #FIXME:

resources:
  - backend.yaml
  - ingress.yaml # API 호출 방식이 Client-Side인 경우 주석 해제

configMapGenerator:
  - name: backend-config
    files:
      - config.json=config/backend-config.json
  # mysql-init-scripts: dummy_data.sql은 Alembic이 테이블 생성 후 별도 주입
  # (DML을 DDL보다 먼저 실행하면 MySQL이 크래시됨)

generatorOptions:
  disableNameSuffixHash: true
